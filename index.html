<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BudgetLens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --red:#B81E22; --red-2:#A01B20; --red-3:#8A1418;
    --red-soft:#FBEAEA; --red-line:#F0E0E0;
    --ink:#1A1A1A; --t1:#222; --t2:#6A5C5E; --t3:#A89A9C;
    --bg:#F4EEEE; --card:#fff; --line:#F2EAEA;
    --green:#2E7D32; --green-soft:#EAF3EA;
    --gold:#B07D00; --gold-soft:#FBF3D8;
    --amber:#B0500A; --amber-soft:#FDF0E4;
    --r:12px; --r-lg:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Mulish',-apple-system,BlinkMacSystemFont,sans-serif;
    background:#F4EEEE;
    background-image:radial-gradient(circle at 12% 0%,rgba(184,30,34,0.06) 0%,transparent 42%),radial-gradient(circle at 88% 6%,rgba(184,30,34,0.05) 0%,transparent 38%);
    background-attachment:fixed;color:var(--t1);min-height:100vh;-webkit-text-size-adjust:100%;}

  /* Header */
  .hd{background:var(--red);background-image:linear-gradient(135deg,#C9282E 0%,var(--red-2) 55%,var(--red-3) 100%);
    color:#fff;padding:18px 20px 20px;position:relative;overflow:hidden;}
  .hd::after{content:'';position:absolute;top:-40%;right:-6%;width:220px;height:220px;
    background:radial-gradient(circle,rgba(255,255,255,0.10) 0%,transparent 70%);pointer-events:none;}
  .hd-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:0.82;position:relative;z-index:1;}
  .hd-title{font-size:23px;font-weight:800;letter-spacing:-0.4px;margin-top:2px;position:relative;z-index:1;}
  .hd-sub{font-size:13px;opacity:0.85;margin-top:2px;position:relative;z-index:1;}
  .hd-refresh{position:absolute;top:18px;right:18px;width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:17px;cursor:pointer;z-index:2;}

  .page{max-width:1100px;margin:0 auto;padding:16px;}

  /* Tabs (nav) */
  .tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--red-line);border-radius:12px;padding:5px;margin-bottom:16px;overflow-x:auto;}
  .tab{flex:1;min-width:max-content;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:700;color:var(--t2);cursor:pointer;text-align:center;white-space:nowrap;border:none;background:none;font-family:inherit;}
  .tab.on{background:var(--red);color:#fff;}

  /* Metric cards */
  .metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
  .metric{background:var(--card);background-image:linear-gradient(180deg,#fff,#FFFBFB);border:1px solid var(--red-line);border-radius:14px;padding:14px 16px;box-shadow:0 2px 10px rgba(160,27,32,0.05);}
  .metric-label{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px;}
  .metric-value{font-size:22px;font-weight:800;margin-top:4px;color:var(--ink);}
  .metric-value.red{color:var(--red);} .metric-value.green{color:var(--green);} .metric-value.amber{color:var(--amber);}
  .metric-sub{font-size:11px;color:var(--t3);margin-top:2px;}

  /* Generic card */
  .card{background:var(--card);border:1px solid var(--red-line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(160,27,32,0.05);}
  .card-title{font-size:13px;font-weight:700;color:var(--red-2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}

  /* Filter bar */
  .filters{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
  select,input{font-family:inherit;font-size:14px;padding:9px 11px;border:1px solid var(--red-line);border-radius:9px;background:var(--card);color:var(--t1);}
  select:focus,input:focus{outline:none;border-color:var(--red);}

  /* Transaction list */
  .tx{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
  .tx:last-child{border-bottom:none;}
  .tx-main{flex:1;min-width:0;}
  .tx-merchant{font-size:15px;font-weight:700;}
  .tx-meta{font-size:12px;color:var(--t2);margin-top:2px;}
  .tx-amt{text-align:right;flex-shrink:0;}
  .tx-total{font-size:15px;font-weight:700;color:var(--red);}
  .tx-share{font-size:11px;color:var(--gold);}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:3px 8px;border-radius:6px;background:var(--red-soft);color:var(--red-2);}

  .btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn.ghost{background:var(--card);color:var(--red-2);border:1px solid var(--red-line);}
  .fab{position:fixed;bottom:20px;right:20px;width:54px;height:54px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:26px;box-shadow:0 4px 16px rgba(160,27,32,0.4);cursor:pointer;z-index:20;}

  .empty{text-align:center;padding:34px 16px;color:var(--t3);font-size:14px;}
  .spin{width:22px;height:22px;border:2.5px solid var(--red-soft);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .fade-in{animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:22px;opacity:0;transition:.25s;z-index:100;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .setup{padding:22px;}
  .chart-box{position:relative;height:220px;}
  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:640px){ .chart-row{grid-template-columns:1fr;} }

  /* table head with action */
  .table-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .btn.small{padding:6px 11px;font-size:12px;}

  /* second FAB (scan) sits above the + */
  .fab-scan{bottom:84px;font-size:22px;background:var(--red-2);}

  /* modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(40,20,22,0.45);z-index:50;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;}
  @media(min-width:640px){ .modal-overlay{align-items:center;} .modal-box{border-radius:20px;} }
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:1;}
  .modal-title{font-size:16px;font-weight:800;}
  .modal-x{background:none;border:none;font-size:20px;color:var(--t3);cursor:pointer;width:36px;height:36px;}
  .modal-body{padding:16px 18px;}
  .modal-foot{display:flex;gap:10px;padding:12px 18px 20px;position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--line);}
  .modal-foot .btn{flex:1;}

  /* form fields */
  .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
  .fg label{font-size:12px;font-weight:600;color:var(--t2);}
  .fg input,.fg select{width:100%;}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:480px){ .frow{grid-template-columns:1fr;gap:0;} }

  /* split block */
  .split-block{margin-top:6px;padding-top:12px;border-top:1px solid var(--line);}
  .split-toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .split-note{font-size:12px;color:var(--t3);margin-bottom:8px;}
  .split-row{display:flex;gap:7px;align-items:center;margin-bottom:7px;}
  .sp-del{background:none;border:none;color:var(--t3);font-size:16px;cursor:pointer;padding:0 4px;}
  .split-summary{background:var(--red-soft);border-radius:9px;padding:9px 12px;margin-top:8px;font-size:12px;color:var(--t2);}

  /* scan */
  .scan-btns{display:flex;gap:10px;}
  .scan-btns .btn{flex:1;}
</style>
</head>
<body>
<div id="app"><div class="spin"></div></div>
<button class="fab fab-scan" id="fab-scan" style="display:none" onclick="openScan()">📷</button>
<button class="fab" id="fab" style="display:none" onclick="onFab()">+</button>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()"></div>
<div class="toast" id="toast"></div>
<script>
// ============================================================
// BudgetLens v3 — slice 1 (shell: dashboard read + theme)
// ============================================================
var API = localStorage.getItem('bl_api') || '';
var state = { tab:'dashboard', data:null };
var CATEGORIES = ['Food & Drink','Shopping','Groceries','Accommodation','Transport','Entertainment','Other'];
var PAYMENTS = ['MariBank','UOB Credit Card','Cash','PayNow','YouTrip','Apple Pay','Other'];
var CREDIT_METHODS = ['MariBank'];  // methods treated as credit for the repayment view (slice 3)
var CAT_COLOURS = {
  'Food & Drink':'#B81E22','Shopping':'#C15B4E','Groceries':'#2E7D32',
  'Accommodation':'#8A1418','Transport':'#B07D00','Entertainment':'#7C3AED',
  'Other':'#A89A9C'
};

function apiGet(action, params){
  var q='?action='+action;
  if(params) Object.keys(params).forEach(function(k){ if(params[k]!=null) q+='&'+k+'='+encodeURIComponent(params[k]); });
  return fetch(API+q).then(function(r){return r.json();});
}
// text/plain POST -> no preflight (proven CORS pattern)
function apiPost(payload){
  return fetch(API, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); });
}
function uuid(){ return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);}); }
function computeCatBreakdown(txns){
  var m={}; (txns||[]).forEach(function(t){ var c=t.category||'Other'; m[c]=(m[c]||0)+(parseFloat(t.your_share)||0); }); return m;
}
function today(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':s); return d.innerHTML; }
function fmt(n){ var v=parseFloat(n); if(isNaN(v)) return '0.00'; return v.toLocaleString('en-SG',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function paint(html){ var a=document.getElementById('app'); a.innerHTML=html; a.classList.remove('fade-in'); void a.offsetWidth; a.classList.add('fade-in'); }

window.addEventListener('DOMContentLoaded', function(){
  if(!API){ renderSetup(); return; }
  loadDashboard();
});

function renderSetup(){
  paint('<div class="hd"><div class="hd-eyebrow">BudgetLens</div><div class="hd-title">Setup</div></div>'+
    '<div class="setup"><label style="font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:6px">Paste your BudgetLens API URL (ends in /exec)</label>'+
    '<input id="api-in" style="width:100%;margin-bottom:10px" placeholder="https://script.google.com/macros/s/…/exec">'+
    '<button class="btn" style="width:100%" onclick="saveApi()">Save &amp; start</button></div>');
}
function saveApi(){ var v=document.getElementById('api-in').value.trim(); if(!v){toast('Paste the URL');return;} API=v; localStorage.setItem('bl_api',v); loadDashboard(); }

function loadDashboard(keepTab){
  if(!keepTab) document.getElementById('app').innerHTML='<div class="spin"></div>';
  document.getElementById('fab').style.display='none';
  var params={};
  if(state.filters){
    var dates=periodToDates(state.filters.period);
    params.dateFrom=dates.dateFrom; params.dateTo=dates.dateTo;
    if(state.filters.category&&state.filters.category!=='all') params.category=state.filters.category;
    if(state.filters.payment&&state.filters.payment!=='all') params.payment=state.filters.payment;
    if(state.filters.currency&&state.filters.currency!=='all') params.currency=state.filters.currency;
  } else {
    var dm=periodToDates('month'); params.dateFrom=dm.dateFrom; params.dateTo=dm.dateTo;
  }
  apiGet('getDashboard', params).then(function(d){
    if(!d.ok){ toast('Error: '+d.error); return; }
    state.data=d.data; if(!keepTab) state.tab='dashboard'; renderShell();
  }).catch(function(e){ toast('Load failed: '+e.message); });
}

function tabBtn(id,label){ return '<button class="tab'+(state.tab===id?' on':'')+'" onclick="switchTab(\''+id+'\')">'+label+'</button>'; }
function switchTab(id){ state.tab=id; renderShell(); }

function renderShell(){
  var d=state.data;
  var h='<div class="hd"><button class="hd-refresh" onclick="loadDashboard()">↻</button>'+
    '<div class="hd-eyebrow">BudgetLens</div>'+
    '<div class="hd-title">Your money</div>'+
    '<div class="hd-sub">'+d.totalTransactions+' transactions · '+esc(d.serverTime)+'</div></div>'+
    '<div class="page">'+
    '<div class="tabs">'+
      tabBtn('dashboard','📊 Dashboard')+
      tabBtn('transactions','🧾 Transactions')+
      tabBtn('splits','👥 Splits'+(d.unsettledSplits&&d.unsettledSplits.length?' ('+d.unsettledSplits.length+')':''))+
      tabBtn('budget','🎯 Budget')+
      tabBtn('credit','💳 Credit')+
    '</div><div id="tabbody"></div></div>';
  paint(h);
  document.getElementById('fab').style.display='block';
  document.getElementById('fab-scan').style.display='block';
  renderTab();
}

function renderTab(){
  var d=state.data, b=d.budget;
  var body=document.getElementById('tabbody'); if(!body) return;
  if(state.tab==='dashboard'){
    var filteredSpend = d.transactions.reduce(function(s,t){return s+(parseFloat(t.your_share)||0);},0);
    var pct = b.monthly_budget>0 ? Math.min(100, Math.round(b.spent/b.monthly_budget*100)) : 0;
    body.innerHTML =
      '<div class="metric-grid">'+
        metric('My spend','red','SGD '+fmt(filteredSpend),'this period')+
        metric('Budget left','green','SGD '+fmt(b.remaining),'of SGD '+fmt(b.monthly_budget))+
        metric('Owed to me','amber','SGD '+fmt(d.owedToYou),'unsettled splits')+
        metric('Used','', pct+'%','of monthly budget')+
      '</div>'+
      filterBar()+
      '<div class="card"><div class="card-title">By category</div><div class="chart-box"><canvas id="cat-chart"></canvas></div></div>'+
      '<div class="card"><div class="table-head"><span class="card-title" style="margin:0">Recent transactions</span>'+
        '<button class="btn ghost small" onclick="exportCSV()">↓ CSV</button></div><div id="tx-list"></div></div>';
    populateFilterSelects();
    renderCatChart(computeCatBreakdown(d.transactions));
    renderTxList(d.transactions.slice(0,25));
  } else if(state.tab==='transactions'){
    body.innerHTML=filterBar()+
      '<div class="card"><div class="table-head"><span class="card-title" style="margin:0">All transactions</span>'+
      '<button class="btn ghost small" onclick="exportCSV()">↓ CSV</button></div><div id="tx-list"></div></div>';
    populateFilterSelects();
    renderTxList(d.transactions);
  } else if(state.tab==='budget'){
    renderBudgetTab(body);
  } else if(state.tab==='credit'){
    body.innerHTML='<div class="empty">Credit repayment view arrives in slice 3. 💳</div>';
  } else if(state.tab==='splits'){
    renderSplitsTab(body);
  }
}

function filterBar(){
  var f=state.filters||{};
  return '<div class="filters">'+
    '<select id="f-period" onchange="onFilterChange()">'+
      opt('month','This month',f.period)+opt('30','Last 30 days',f.period)+opt('7','Last 7 days',f.period)+opt('all','All time',f.period)+
    '</select>'+
    '<select id="f-category" onchange="onFilterChange()"><option value="all">All categories</option></select>'+
    '<select id="f-payment" onchange="onFilterChange()"><option value="all">All payments</option></select>'+
    '<select id="f-currency" onchange="onFilterChange()"><option value="all">All currencies</option></select>'+
    '<button class="btn ghost small" onclick="clearFilters()">Clear</button></div>';
}
function opt(v,label,cur){ return '<option value="'+v+'"'+(cur===v?' selected':'')+'>'+label+'</option>'; }

function populateFilterSelects(){
  var d=state.data, f=state.filters||{};
  fillSelect('f-category', CATEGORIES, f.category);
  fillSelect('f-payment', PAYMENTS, f.payment);
  fillSelect('f-currency', d.currencies, f.currency);
}
function fillSelect(id, items, cur){
  var sel=document.getElementById(id); if(!sel) return;
  (items||[]).forEach(function(it){ var o=document.createElement('option'); o.value=o.textContent=it; if(cur===it)o.selected=true; sel.appendChild(o); });
}
function onFilterChange(){
  state.filters={ period:val('f-period'), category:val('f-category'), payment:val('f-payment'), currency:val('f-currency') };
  loadDashboard(true);
}
function clearFilters(){ state.filters=null; loadDashboard(true); }
function val(id){ var el=document.getElementById(id); return el?el.value:'all'; }

function periodToDates(period){
  var now=new Date(), from=null, to=null;
  function iso(d){ return d.toISOString().split('T')[0]; }
  if(period==='month'){ from=iso(new Date(now.getFullYear(),now.getMonth(),1)); to=iso(new Date(now.getFullYear(),now.getMonth()+1,0)); }
  else if(period==='30'){ var d=new Date(now); d.setDate(d.getDate()-30); from=iso(d); to=iso(now); }
  else if(period==='7'){ var e=new Date(now); e.setDate(e.getDate()-7); from=iso(e); to=iso(now); }
  return {dateFrom:from,dateTo:to};
}

function metric(label,cls,val,sub){
  return '<div class="metric"><div class="metric-label">'+esc(label)+'</div>'+
    '<div class="metric-value '+cls+'">'+esc(val)+'</div>'+
    (sub?'<div class="metric-sub">'+esc(sub)+'</div>':'')+'</div>';
}

function renderTxList(txns){
  var el=document.getElementById('tx-list'); if(!el) return;
  if(!txns||!txns.length){ el.innerHTML='<div class="empty">No transactions yet. Tap + to add one. 🧾</div>'; return; }
  el.innerHTML = txns.map(function(t){
    var isSplit = parseFloat(t.your_share) < parseFloat(t.sgd_amount)-0.01;
    return '<div class="tx" onclick="openEdit(\''+t.id+'\')"><div class="tx-main">'+
      '<div class="tx-merchant">'+esc(t.merchant_en||t.merchant||'—')+'</div>'+
      '<div class="tx-meta">'+esc(t.date||'')+' · '+esc(t.category||'Other')+(t.location?' · '+esc(t.location):'')+' · '+esc(t.payment_method||'')+'</div></div>'+
      '<div class="tx-amt"><div class="tx-total">SGD '+fmt(t.sgd_amount)+'</div>'+
      (isSplit?'<div class="tx-share">my share SGD '+fmt(t.your_share)+'</div>':'')+'</div></div>';
  }).join('');
}

var catChart=null;
function renderCatChart(breakdown){
  var el=document.getElementById('cat-chart'); if(!el) return;
  var labels=Object.keys(breakdown), values=labels.map(function(l){return breakdown[l];});
  if(!labels.length){ el.parentNode.innerHTML='<div class="empty">No spending to chart yet.</div>'; return; }
  var colors=labels.map(function(l){return CAT_COLOURS[l]||'#D8B0B0';});
  if(catChart) catChart.destroy();
  catChart=new Chart(el.getContext('2d'),{type:'doughnut',
    data:{labels:labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',
      plugins:{legend:{position:'right',labels:{font:{family:'Mulish',size:12},color:'#6A5C5E',boxWidth:12}},
        tooltip:{callbacks:{label:function(c){ var tot=values.reduce(function(a,b){return a+b;},0); return ' SGD '+fmt(c.parsed)+' ('+Math.round(c.parsed/tot*100)+'%)'; }}}}}});
}

// ============ Splits tab ============
function renderSplitsTab(body){
  var d=state.data, list=d.unsettledSplits||[];
  if(!list.length){ body.innerHTML='<div class="empty">No outstanding splits — everyone\'s paid up. 👍</div>'; return; }
  body.innerHTML='<div class="card"><div class="card-title">Owed to you — SGD '+fmt(d.owedToYou)+'</div>'+
    list.map(function(s){
      return '<div class="tx"><div class="tx-main"><div class="tx-merchant">'+esc(s.merchant||'—')+'</div>'+
        '<div class="tx-meta">'+esc(s.date||'')+' · '+esc(s.person||'')+'</div></div>'+
        '<div class="tx-amt"><div class="tx-total">SGD '+fmt(s.share_sgd)+'</div>'+
        (s.share_pct?'<div class="tx-share">'+Math.round(s.share_pct)+'%</div>':'')+'</div>'+
        '<button class="btn ghost small" style="margin-left:10px" onclick="settle(\''+s.split_id+'\')">✓ Settle</button></div>';
    }).join('')+'</div>';
}
function settle(splitId){
  var d=state.data;
  var removed=null;
  d.unsettledSplits=(d.unsettledSplits||[]).filter(function(s){ if(s.split_id===splitId){removed=s;return false;} return true; });
  if(removed) d.owedToYou=Math.round((d.owedToYou-removed.share_sgd)*100)/100;
  toast('Settled'); renderShell();
  apiPost({action:'settleUp',split_id:splitId}).then(function(r){ if(!r.ok){ toast('Failed — refreshing'); loadDashboard(true); } })
    .catch(function(){ toast('Failed — refreshing'); loadDashboard(true); });
}

// ============ Budget tab (monthly — enhanced breakdown in slice 3) ============
function renderBudgetTab(body){
  var b=state.data.budget;
  var pct=b.monthly_budget>0?Math.min(100,Math.round(b.spent/b.monthly_budget*100)):0;
  var now=new Date(), dom=now.getDate(), dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  var rate=dom>0?b.spent/dom:0, projected=Math.round(rate*dim*100)/100;
  var over=projected>b.monthly_budget;
  body.innerHTML=
    '<div class="card"><div class="card-title">Monthly budget</div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
      '<input id="bud-in" type="number" inputmode="decimal" value="'+b.monthly_budget+'" style="flex:1">'+
      '<button class="btn" onclick="saveBudget()">Save</button></div>'+
      '<div style="font-size:12px;color:var(--t3);margin-top:8px">Tracks your personal share only — split portions owed by others are excluded.</div>'+
    '</div>'+
    '<div class="card"><div class="card-title">This month</div>'+
      '<div class="metric-grid" style="margin-bottom:8px">'+
        metric('Spent','red','SGD '+fmt(b.spent),'day '+dom+' of '+dim)+
        metric('Remaining','green','SGD '+fmt(b.remaining),(dim-dom)+' days left')+
        metric('Projected',over?'red':'green','SGD '+fmt(projected),over?'⚠ over budget':'✓ under budget')+
      '</div>'+
      '<div style="height:8px;background:var(--red-soft);border-radius:4px;overflow:hidden;margin-top:6px">'+
        '<div style="height:100%;width:'+pct+'%;background:'+(pct>90?'var(--red)':pct>70?'var(--gold)':'var(--green)')+'"></div></div>'+
      '<div style="font-size:12px;color:var(--t2);margin-top:6px">'+pct+'% used · SGD '+fmt(Math.round(rate*100)/100)+'/day average</div>'+
    '</div>'+
    '<div class="empty" style="padding:16px">Per-category budgets &amp; day-by-day breakdown arrive in slice 3.</div>';
}
function saveBudget(){
  var v=parseFloat(document.getElementById('bud-in').value);
  if(!v||v<=0){ toast('Enter a valid amount'); return; }
  apiPost({action:'updateBudget',amount:v}).then(function(r){
    if(r.ok){ toast('Budget updated'); loadDashboard(true); } else toast('Error: '+r.error);
  });
}

// ============ CSV export ============
function exportCSV(){
  var txns=state.data.transactions||[];
  var headers=['Date','Merchant','Merchant (EN)','Category','Location','Payment','Original','Currency','SGD Total','Your Share','Source','Notes'];
  var rows=txns.map(function(t){ return [t.date,t.merchant,t.merchant_en,t.category,t.location,t.payment_method,t.original_amount,t.original_currency,t.sgd_amount,t.your_share,t.source,t.notes]; });
  var csv=[headers].concat(rows).map(function(r){ return r.map(function(v){ return '"'+(v==null?'':v.toString().replace(/"/g,'""'))+'"'; }).join(','); }).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='budgetlens-export.csv'; a.click();
}

// ============ Add / Edit / Scan modals ============
var editingId=null, splitCount=0;

function onFab(){ openAdd(); }

function modalShell(title, bodyHtml, footerHtml){
  var m=document.getElementById('modal');
  m.innerHTML='<div class="modal-box"><div class="modal-head"><span class="modal-title">'+esc(title)+'</span>'+
    '<button class="modal-x" onclick="closeModal()">✕</button></div>'+
    '<div class="modal-body">'+bodyHtml+'</div>'+
    '<div class="modal-foot">'+footerHtml+'</div></div>';
  m.classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); editingId=null; }

function txForm(t){
  t=t||{};
  return '<div class="fg"><label>Merchant</label><input id="x-merchant" value="'+esc(t.merchant||'')+'" placeholder="e.g. Mercado de la Boqueria"></div>'+
    '<div class="fg"><label>English name</label><input id="x-merchant-en" value="'+esc(t.merchant_en||'')+'" placeholder="If non-Latin above"></div>'+
    '<div class="frow"><div class="fg"><label>Date</label><input id="x-date" type="date" value="'+esc(t.date||today())+'"></div>'+
    '<div class="fg"><label>Category</label><select id="x-category">'+CATEGORIES.map(function(c){return '<option'+(t.category===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div></div>'+
    '<div class="frow"><div class="fg"><label>Amount</label><input id="x-amount" type="number" inputmode="decimal" step="0.01" value="'+(t.original_amount||'')+'" oninput="onAmtChange()" onblur="onAmtChange()"></div>'+
    '<div class="fg"><label>Currency</label><input id="x-currency" maxlength="3" style="text-transform:uppercase" value="'+esc(t.original_currency||'SGD')+'" oninput="onAmtChange()" onblur="onAmtChange()"></div></div>'+
    '<div class="frow"><div class="fg"><label>SGD equivalent</label><input id="x-sgd" type="number" inputmode="decimal" step="0.01" value="'+(t.sgd_amount||'')+'"></div>'+
    '<div class="fg"><label>Payment</label><select id="x-payment">'+PAYMENTS.map(function(p){return '<option'+(t.payment_method===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div></div>'+
    '<div class="frow"><div class="fg"><label>Location</label><input id="x-location" value="'+esc(t.location||'')+'" placeholder="e.g. Barcelona"></div>'+
    '<div class="fg"><label>Notes</label><input id="x-notes" value="'+esc(t.notes||'')+'" placeholder="Optional"></div></div>'+
    splitBlock();
}
function splitBlock(){
  return '<div class="split-block"><div class="split-toggle-row"><span style="font-size:14px;font-weight:700">Split this bill?</span>'+
    '<label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer"><input type="checkbox" id="x-split" onchange="toggleSplit()"> Yes</label></div>'+
    '<div id="split-rows" style="display:none"><div class="split-note" id="split-note"></div><div id="split-list"></div>'+
    '<button class="btn ghost small" style="width:100%;margin-top:6px" onclick="addSplitRow()">+ Add person</button>'+
    '<div class="split-summary" id="split-summary"></div></div></div>';
}

function openAdd(){
  editingId=null; splitCount=0;
  modalShell('Add transaction', txForm({}),
    '<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveTx()">Save</button>');
}
function openEdit(id){
  apiGet('getTransaction',{id:id}).then(function(r){
    if(!r.ok||!r.transaction){ toast('Could not load'); return; }
    var t=r.transaction; editingId=id; splitCount=0;
    modalShell('Edit transaction', txForm(t),
      '<button class="btn ghost" onclick="deleteTx(\''+id+'\')" style="color:var(--red)">Delete</button>'+
      '<button class="btn" onclick="saveTx()">Save</button>');
    if(t.splits&&t.splits.length){
      document.getElementById('x-split').checked=true; toggleSplit();
      var origTotal=parseFloat(t.original_amount)||parseFloat(t.sgd_amount)||0;
      var sgdTotal=parseFloat(t.sgd_amount)||0;
      t.splits.forEach(function(s){
        addSplitRow();
        var row=document.getElementById('split-list').lastElementChild;
        row.querySelector('.sp-name').value=s.person||'';
        var shareSgd=parseFloat(s.share_sgd)||0;
        var shareOrig=sgdTotal>0?Math.round(shareSgd/sgdTotal*origTotal*100)/100:shareSgd;
        row.querySelector('.sp-amt').value=shareOrig.toFixed(2);
        row.querySelector('.sp-pct').value=s.share_pct||'';
      });
      updateSplitSummary();
    }
  });
}

function onAmtChange(){
  var ccy=(val2('x-currency')||'SGD').toUpperCase();
  var amt=parseFloat(val2('x-amount'))||0;
  var sgdEl=document.getElementById('x-sgd');
  if(!sgdEl) return;
  if(ccy==='SGD'){ sgdEl.value=amt||''; return; }
  // only convert when we have a full 3-letter code + an amount
  if(ccy.length===3 && amt>0){
    sgdEl.placeholder='converting…';
    apiGet('convert',{amount:amt,currency:ccy}).then(function(r){
      if(r.ok && r.sgd){ sgdEl.value=r.sgd; sgdEl.placeholder=''; }
      else sgdEl.placeholder='';
    }).catch(function(){ sgdEl.placeholder=''; });
  }
}
function val2(id){ var el=document.getElementById(id); return el?el.value:''; }

function toggleSplit(){
  var on=document.getElementById('x-split').checked;
  document.getElementById('split-rows').style.display=on?'block':'none';
  if(on && document.getElementById('split-list').children.length===0) addSplitRow();
  updateSplitNote();
}
function updateSplitNote(){
  var ccy=(val2('x-currency')||'SGD').toUpperCase();
  var note=document.getElementById('split-note');
  if(note) note.textContent='Enter each person\'s share in '+ccy+' (they owe you; the rest is your share).';
}
function addSplitRow(){
  splitCount++;
  var div=document.createElement('div'); div.className='split-row';
  div.innerHTML='<input class="sp-name" placeholder="Name" style="flex:1">'+
    '<input class="sp-pct" type="number" inputmode="decimal" placeholder="%" style="width:56px" oninput="syncPct(this)">'+
    '<input class="sp-amt" type="number" inputmode="decimal" placeholder="amt" style="width:80px" oninput="updateSplitSummary()">'+
    '<button class="sp-del" onclick="this.parentNode.remove();updateSplitSummary()">✕</button>';
  document.getElementById('split-list').appendChild(div);
  updateSplitSummary();
}
function syncPct(inp){
  var total=parseFloat(val2('x-amount'))||0, pct=parseFloat(inp.value)||0;
  var row=inp.parentNode, amtEl=row.querySelector('.sp-amt');
  if(amtEl&&total>0) amtEl.value=(Math.round(total*pct/100*100)/100).toFixed(2);
  updateSplitSummary();
}
function updateSplitSummary(){
  var ccy=(val2('x-currency')||'SGD').toUpperCase();
  var total=parseFloat(val2('x-amount'))||0, assigned=0;
  document.querySelectorAll('#split-list .split-row').forEach(function(r){ assigned+=parseFloat(r.querySelector('.sp-amt').value)||0; });
  var yours=Math.round((total-assigned)*100)/100;
  var el=document.getElementById('split-summary');
  if(el){ var over=assigned>total+0.01;
    el.innerHTML='<b>Your share:</b> '+ccy+' '+fmt(Math.max(0,yours))+' · others: '+ccy+' '+fmt(assigned)+' of '+ccy+' '+fmt(total)+
      (over?' <span style="color:var(--red)">⚠ over by '+ccy+' '+fmt(assigned-total)+'</span>':''); }
}
function collectSplits(sgdTotal){
  var total=parseFloat(val2('x-amount'))||0, assigned=0, splits=[];
  document.querySelectorAll('#split-list .split-row').forEach(function(r){
    var name=r.querySelector('.sp-name').value.trim();
    var amtOrig=parseFloat(r.querySelector('.sp-amt').value)||0;
    var pct=parseFloat(r.querySelector('.sp-pct').value)||(total>0?Math.round(amtOrig/total*100):0);
    var shareSgd=total>0?Math.round(amtOrig/total*sgdTotal*100)/100:amtOrig;
    if(name){ splits.push({split_id:uuid(),person:name,share_sgd:shareSgd,share_pct:pct}); assigned+=amtOrig; }
  });
  var yoursOrig=Math.max(0,Math.round((total-assigned)*100)/100);
  var yoursSgd=total>0?Math.round(yoursOrig/total*sgdTotal*100)/100:yoursOrig;
  return {splits:splits, yourShare:yoursSgd};
}

function saveTx(){
  var merchant=val2('x-merchant').trim();
  if(!merchant){ toast('Enter a merchant'); return; }
  var ccy=(val2('x-currency')||'SGD').toUpperCase();
  var amt=parseFloat(val2('x-amount'))||0;
  var sgd=parseFloat(val2('x-sgd'))||amt;
  var isSplit=document.getElementById('x-split').checked;
  var sp=isSplit?collectSplits(sgd):{splits:[],yourShare:sgd};
  var id=editingId||uuid();
  var txn={ id:id, merchant:merchant, merchant_en:val2('x-merchant-en').trim()||merchant,
    date:val2('x-date')||today(), category:val2('x-category'), location:val2('x-location').trim(),
    payment_method:val2('x-payment'), original_amount:amt, original_currency:ccy, sgd_amount:sgd,
    your_share:sp.yourShare, notes:val2('x-notes').trim(), source: editingId?undefined:'manual' };
  var wasEditing=!!editingId;
  var action = wasEditing ? 'updateTransaction' : 'addTransaction';
  var payload = wasEditing ? {action:action,id:id,txn:txn,splits:sp.splits} : {action:action,txn:txn,splits:sp.splits};

  // optimistic: update local cache + re-render immediately
  var d=state.data;
  var localTxn={}; for(var k in txn) localTxn[k]=txn[k];
  localTxn.repaid=false; localTxn.trip_id=localTxn.trip_id||'';
  if(wasEditing){
    for(var i=0;i<d.transactions.length;i++){ if(d.transactions[i].id===id){ d.transactions[i]=localTxn; break; } }
  } else {
    d.transactions.unshift(localTxn);
    d.totalTransactions=(d.totalTransactions||0)+1;
  }
  closeModal(); toast(wasEditing?'Updated':'Saved'); renderShell();

  apiPost(payload).then(function(r){ if(!r.ok){ toast('Save failed — refreshing'); loadDashboard(true); } })
    .catch(function(){ toast('Save failed — refreshing'); loadDashboard(true); });
}
function deleteTx(id){
  if(!confirm('Delete this transaction?')) return;
  var d=state.data;
  d.transactions=d.transactions.filter(function(t){return t.id!==id;});
  d.totalTransactions=Math.max(0,(d.totalTransactions||1)-1);
  closeModal(); toast('Deleted'); renderShell();
  apiPost({action:'deleteTransaction',id:id}).then(function(r){ if(!r.ok){ toast('Delete failed — refreshing'); loadDashboard(true); } })
    .catch(function(){ toast('Delete failed — refreshing'); loadDashboard(true); });
}

// ============ Receipt scan ============
function openScan(){
  modalShell('Scan receipt',
    '<div class="scan-btns"><button class="btn ghost" onclick="document.getElementById(\'cam\').click()">📷 Take photo</button>'+
    '<button class="btn ghost" onclick="document.getElementById(\'upl\').click()">🖼 Upload</button></div>'+
    '<input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handleReceipt(event)">'+
    '<input type="file" id="upl" accept="image/*" style="display:none" onchange="handleReceipt(event)">'+
    '<div id="scan-status" style="font-size:13px;color:var(--t2);margin-top:10px;min-height:18px"></div>'+
    '<img id="scan-preview" style="max-width:100%;border-radius:10px;margin-top:10px;display:none">'+
    '<div id="scan-form"></div>',
    '<button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" id="scan-save" style="display:none" onclick="saveTx()">Save</button>');
}
function handleReceipt(e){
  var file=e.target.files[0]; if(!file) return;
  var pv=document.getElementById('scan-preview');
  var rd=new FileReader(); rd.onload=function(ev){ pv.src=ev.target.result; pv.style.display='block'; }; rd.readAsDataURL(file);
  document.getElementById('scan-status').textContent='Analysing with Claude…';
  var b=new FileReader();
  b.onload=function(ev){
    var base64=ev.target.result.split(',')[1];
    apiPost({action:'scanReceipt',image:base64,mimeType:file.type}).then(function(r){
      if(!r.ok){ document.getElementById('scan-status').textContent='Scan failed: '+(r.error||'unknown'); return; }
      var d=r.data;
      document.getElementById('scan-status').textContent='Detected '+(d.language_detected||'—')+' · confidence '+(d.confidence||'—');
      document.getElementById('scan-form').innerHTML=txForm({
        merchant:d.merchant_original||d.merchant_en||'', merchant_en:d.merchant_en||d.merchant_original||'',
        date:d.date||today(), original_amount:d.total_amount||'', original_currency:(d.currency||'SGD').toUpperCase(),
        sgd_amount:d.sgd_amount||d.total_amount||'', category:d.category||'Other'
      });
      editingId=null;
      document.getElementById('scan-save').style.display='inline-flex';
    }).catch(function(err){ document.getElementById('scan-status').textContent='Error: '+err.message; });
  };
  b.readAsDataURL(file);
}
</script>
